<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form</title>
    <link rel="stylesheet" href="../css/form.css">
</head>
<body>
<main>
    <form action="#">
        <h1>Homework for CSS flexbox</h1>
        <div class="tables-fields">
            <fieldset>
                <legend>Personal Information</legend>
                <div class="form-group">
                    <label for="first-name">First Name:</label>
                    <input type="text" id="first-name" autofocus>
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name:</label>
                    <input type="text" id="last-name">
                </div>
                <div class="form-group">
                    <label for="birthday">Birthday</label>
                    <input type="datetime-local" id="birthday">
                </div>
                <div class="radio-container">
                    <p>Gender</p>
                    <div class="ratio-box">
                        <label for="male">Male</label>
                        <input type="radio" name="gender" id="male" value="male" checked>
                    </div>
                    <div class="ratio-box">
                        <label for="female">Female</label>
                        <input type="radio" name="gender" id="female" value="female">
                    </div>
                </div>
                <div class="form-group">
                    <label for="experience">Drive experience</label>
                    <select name="experience" id="experience">
                        <option value="null">---</option>
                        <option value="expert">expert</option>
                        <option value="more-than-10">more than 10</option>
                        <option value="5-10">5-10</option>
                        <option value="2-5">2-5</option>
                        <option value="less-than-2">less than 2</option>
                        <option value="beginner">beginner</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Contacts</legend>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label for="tel">Phone</label>
                    <input type="tel" id="tel">
                </div>
                <div class="form-group">
                    <label for="address-area">Address:</label>
                    <textarea name="address" id="address-area" cols="20" rows="2"></textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend>Car info</legend>

                <div class="form-group">
                    <label for="brand">Brand</label>
                    <select name="brand" id="brand">
                        <option value="null">---</option>
                        <option value="ford">Ford</option>
                        <option value="toyota">Toyota</option>
                        <option value="bmw">BMW</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="model">Model</label>
                    <select name="model" id="model">
                        <option value="null">---</option>
                        <option value="mondeo">Mondeo</option>
                        <option value="fiesta">Fiesta</option>
                        <option value="rav">RAV</option>
                        <option value="camry">Camry</option>
                        <option value="x5">X5</option>
                        <option value="i4">i4</option>
                    </select>
                </div>
                <div class="form-group checkbox-container">
                    <label for="used">Used</label>
                    <input type="checkbox" name="used" id="used">
                </div>
                <div class="radio-container">
                    <div class="radio-box">
                        <label for="red">Red</label>
                        <input type="radio" name="color" id="red" value="red">
                    </div>
                    <div class="radio-box">
                        <label for="black">Black</label>
                        <input type="radio" name="color" id="black" value="black">
                    </div>
                    <div class="radio-box">
                        <label for="blue">Blue</label>
                        <input type="radio" name="color" id="blue" value="blue">
                    </div>
                    <div class="radio-box">
                        <label for="white">White</label>
                        <input type="radio" name="color" id="white" value="white">
                    </div>
                    <div class="radio-box">
                        <label for="grey">Grey</label>
                        <input type="radio" name="color" id="grey" value="grey">
                    </div>
                </div>
                <div class="form-group price-container">
                    <label for="price">Price</label>
                    <input type="range" name="price" id="price" min="10" max="80" list="prices">
                    <datalist id="prices">
                        <option value="10" label="10"></option>
                        <option value="20" label="20"></option>
                        <option value="30" label="30"></option>
                        <option value="40" label="40"></option>
                        <option value="50" label="50"></option>
                        <option value="60" label="60"></option>
                        <option value="70" label="70"></option>
                        <option value="80" label="80"></option>
                    </datalist>
                </div>
            </fieldset>
        </div>

        <div class="buttons-container">
            <button type="reset">Cancel</button>
            <button type="submit">Ok</button>
        </div>

        <div class="return-container">
            <a href="../../index.html" id="return-to-main-page">← Повернення на головну сторінку</a>
        </div>
    </form>
</main>
</body>
</html>
